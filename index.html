<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Rating</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>AI Rating</h1>

<select id="mode">
    <option value="male">Мужской образ</option>
    <option value="female">Женский образ</option>
    <option value="general">Общая оценка</option>
</select>

<input id="age" type="number" placeholder="Возраст">
<input id="height" type="number" placeholder="Рост">
<input id="weight" type="number" placeholder="Вес">

<input id="photo" type="file" accept="image/*">

<button onclick="analyze()">
    Оценить
</button>

<div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
